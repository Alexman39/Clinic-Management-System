<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clinic Management System – Assignment Kanban</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #edece9;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.1);
    --border-hover: rgba(0,0,0,0.2);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: 'DM Sans', system-ui, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --text-primary: #f0ede6;
      --text-secondary: #a8a6a0;
      --text-tertiary: #6b6a65;
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.2);
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem;
  }

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap');

  header {
    max-width: 1100px;
    margin: 0 auto 2rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  header p {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .progress-bar-wrap {
    max-width: 1100px;
    margin: 0 auto 1.5rem;
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-label {
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #1D9E75;
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .progress-pct {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
  }

  .legend {
    max-width: 1100px;
    margin: 0 auto 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .phase-label {
    max-width: 1100px;
    margin: 2rem auto 0.5rem;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }

  .columns {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 0.5rem;
  }

  .card {
    min-width: 240px;
    flex: 0 0 240px;
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }

  .card:hover { border-color: var(--border-hover); }
  .card.completed { opacity: 0.5; }
  .card.completed .card-title { text-decoration: line-through; }

  .done-mark {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border-hover);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .done-mark.checked {
    background: #1D9E75;
    border-color: #1D9E75;
  }

  .done-mark.checked::after {
    content: '';
    width: 8px;
    height: 5px;
    border-left: 1.5px solid white;
    border-bottom: 1.5px solid white;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 5px;
    padding-right: 26px;
    line-height: 1.4;
  }

  .card-sub {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 999px;
    margin-top: 8px;
  }

  .tag-oop   { background: #EEEDFE; color: #3C3489; }
  .tag-ui    { background: #E1F5EE; color: #085041; }
  .tag-file  { background: #FAEEDA; color: #633806; }
  .tag-doc   { background: #FAECE7; color: #712B13; }
  .tag-grade { background: #E6F1FB; color: #0C447C; }

  @media (prefers-color-scheme: dark) {
    .tag-oop   { background: #26215C; color: #AFA9EC; }
    .tag-ui    { background: #04342C; color: #5DCAA5; }
    .tag-file  { background: #412402; color: #EF9F27; }
    .tag-doc   { background: #4A1B0C; color: #F0997B; }
    .tag-grade { background: #042C53; color: #85B7EB; }
  }
</style>
</head>
<body>

<header>
  <h1>Clinic Management System</h1>
  <p>CN5004 Assignment 2025–26 — Task roadmap. Click the circle on any card to mark it done.</p>
</header>

<div class="progress-bar-wrap">
  <span class="progress-label">Overall progress</span>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <span class="progress-pct" id="prog-pct">0 / 0 done</span>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#534AB7"></div> OOP / logic</div>
  <div class="legend-item"><div class="legend-dot" style="background:#0F6E56"></div> JavaFX UI</div>
  <div class="legend-item"><div class="legend-dot" style="background:#BA7517"></div> File I/O</div>
  <div class="legend-item"><div class="legend-dot" style="background:#993C1D"></div> Report / docs</div>
  <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div> Graded deliverable</div>
</div>

<div class="phase-label">Phase 1 — Foundation</div>
<div class="columns" id="phase1"></div>

<div class="phase-label">Phase 2 — Core features</div>
<div class="columns" id="phase2"></div>

<div class="phase-label">Phase 3 — Polish &amp; submit</div>
<div class="columns" id="phase3"></div>

<script>
const data = {
  phase1: [
    { title: "Plan your classes", sub: "Sketch Doctor, Patient, Appointment on paper. Decide fields & relationships before touching code.", tag: "tag-oop", tagLabel: "OOP / logic", id: "c1" },
    { title: "Set up IntelliJ project", sub: "Create a JavaFX project. Add JavaFX SDK to module path. Confirm 'Hello World' window opens.", tag: "tag-ui", tagLabel: "JavaFX UI", id: "c2" },
    { title: "Build OOP model", sub: "Code Doctor, Patient, Appointment classes with constructors, getters/setters, Javadoc comments.", tag: "tag-oop", tagLabel: "OOP / logic", id: "c3" },
    { title: "Design File I/O layer", sub: "Write FileManager class: save/load all three entity types to .csv or .txt files.", tag: "tag-file", tagLabel: "File I/O", id: "c4" }
  ],
  phase2: [
    { title: "Patient registration screen", sub: "JavaFX form to add a new patient. Validate required fields. Save to file on submit.", tag: "tag-ui", tagLabel: "JavaFX UI", id: "c5" },
    { title: "Doctor management screen", sub: "List of doctors with specialty. Add/remove doctors. Persist changes to file.", tag: "tag-ui", tagLabel: "JavaFX UI", id: "c6" },
    { title: "Appointment booking screen", sub: "Pick doctor, patient, date & time. Block double-booking (same doctor, same slot). Save to file.", tag: "tag-oop", tagLabel: "OOP / logic", id: "c7" },
    { title: "Search & filter", sub: "Filter appointments by today's date. Search patients/doctors by name. Use ObservableList + FilteredList.", tag: "tag-ui", tagLabel: "JavaFX UI", id: "c8" },
    { title: "Load data on startup", sub: "On app launch, read all .csv files and populate the UI tables. Test persistence across restarts.", tag: "tag-file", tagLabel: "File I/O", id: "c9" },
    { title: "Error handling", sub: "Wrap file I/O and booking logic in try-catch. Show user-friendly alerts in the GUI for bad input.", tag: "tag-oop", tagLabel: "OOP / logic", id: "c10" }
  ],
  phase3: [
    { title: "CSS styling", sub: "Create a .css file for JavaFX. Style forms, tables, buttons for a polished look.", tag: "tag-ui", tagLabel: "JavaFX UI", id: "c11" },
    { title: "UML class diagram", sub: "Draw the final class diagram (Doctor, Patient, Appointment, FileManager, Controllers). Include in report.", tag: "tag-doc", tagLabel: "Report / docs", id: "c12" },
    { title: "Academic report", sub: "3–4 pages: intro, user guide, algorithm explanations, UML diagram, screenshots. Submit via Turnitin.", tag: "tag-grade", tagLabel: "Graded deliverable", id: "c13" },
    { title: "Final testing", sub: "Test every screen. Confirm no compile errors. Try edge cases: duplicate appointments, empty fields.", tag: "tag-oop", tagLabel: "OOP / logic", id: "c14" },
    { title: "Zip & submit source code", sub: "Clean the project (remove out/ or target/). Zip the full IntelliJ/Eclipse folder. Submit on Moodle.", tag: "tag-grade", tagLabel: "Graded deliverable", id: "c15" },
    { title: "Prepare viva demo", sub: "Rehearse a 2-min walkthrough. Be ready to explain any class, method, or design choice.", tag: "tag-grade", tagLabel: "Graded deliverable", id: "c16" }
  ]
};

const STORAGE_KEY = "clinic_kanban_done";
let done = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"));

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify([...done])); }

function updateProgress() {
  const all = [...data.phase1, ...data.phase2, ...data.phase3];
  const total = all.length;
  const count = done.size;
  const pct = total ? Math.round(count / total * 100) : 0;
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-pct").textContent = count + " / " + total + " done";
}

function buildCard(card) {
  const div = document.createElement("div");
  div.className = "card" + (done.has(card.id) ? " completed" : "");

  const mark = document.createElement("div");
  mark.className = "done-mark" + (done.has(card.id) ? " checked" : "");
  mark.title = "Mark complete";
  mark.onclick = (e) => {
    e.stopPropagation();
    if (done.has(card.id)) { done.delete(card.id); } else { done.add(card.id); }
    save();
    div.classList.toggle("completed");
    mark.classList.toggle("checked");
    updateProgress();
  };

  const title = document.createElement("div");
  title.className = "card-title";
  title.textContent = card.title;

  const sub = document.createElement("div");
  sub.className = "card-sub";
  sub.textContent = card.sub;

  const tag = document.createElement("span");
  tag.className = "tag " + card.tag;
  tag.textContent = card.tagLabel;

  div.appendChild(mark);
  div.appendChild(title);
  div.appendChild(sub);
  div.appendChild(tag);
  return div;
}

["phase1","phase2","phase3"].forEach(phase => {
  const container = document.getElementById(phase);
  data[phase].forEach(card => container.appendChild(buildCard(card)));
});

updateProgress();
</script>
</body>
</html>
